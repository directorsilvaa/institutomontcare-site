<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Cuidado Humanizado</title>
  <desc id="desc">Ícone SVG separado para o card Cuidado Humanizado — categoria Saúde da Mulher.</desc>
  <defs>
